<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="轻量级待办事项管理工具">
  <meta name="theme-color" content="#4A90D9">
  <title>TodoList - 待办事项</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✅</text></svg>">
</head>
<body>
  <!-- Login Page -->
  <div id="loginPage" class="login-page">
    <div class="login-card">
      <div class="login-logo">✅</div>
      <h1 class="login-title">TodoList</h1>
      <p class="login-subtitle">轻量级待办事项管理工具</p>
      <button id="githubLoginBtn" class="login-btn github-btn" type="button">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
        使用 GitHub 登录
      </button>
    </div>
  </div>

  <!-- App -->
  <div id="app" class="app" style="display:none">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <span class="header-logo">✅ TodoList</span>
      </div>
      <div class="header-right">
        <button id="themeToggle" class="theme-toggle" title="切换主题" aria-label="切换深色/浅色主题">🌙</button>
        <div class="user-menu">
          <button id="menuToggle" class="theme-toggle" title="更多" aria-label="菜单">⋮</button>
          <div id="userDropdown" class="user-dropdown">
            <div id="userInfo" class="user-dropdown-info"></div>
            <button id="exportBtn" class="user-dropdown-item" type="button">📥 导出数据</button>
            <button id="importBtn" class="user-dropdown-item" type="button">📤 导入数据</button>
            <hr class="user-dropdown-divider">
            <button id="logoutBtn" class="user-dropdown-item danger" type="button">🚪 退出登录</button>
          </div>
        </div>
      </div>
    </header>

    <!-- Add Todo -->
    <div class="add-bar">
      <input id="addInput" class="add-input" type="text" placeholder="添加新任务..." aria-label="输入任务内容" maxlength="500">
      <button id="addBtn" class="add-btn" title="添加任务" aria-label="添加任务">+</button>
    </div>

    <div id="addOptions" class="add-options">
      <select id="addPriority" aria-label="优先级">
        <option value="medium">🟡 中优先级</option>
        <option value="high">🔴 高优先级</option>
        <option value="low">🟢 低优先级</option>
      </select>
      <select id="addCategory" aria-label="分类">
        <option value="">无分类</option>
        <option value="工作">💼 工作</option>
        <option value="学习">📚 学习</option>
        <option value="生活">🏠 生活</option>
      </select>
      <input id="addDueDate" type="datetime-local" aria-label="截止日期">
    </div>

    <!-- View Tabs -->
    <div class="view-tabs" role="tablist">
      <button class="view-tab active" data-view="all" role="tab" aria-selected="true">📋 全部任务</button>
      <button class="view-tab" data-view="today" role="tab" aria-selected="false">📅 今日待办</button>
    </div>

    <!-- Search -->
    <div class="search-bar">
      <input id="searchInput" class="search-input" type="text" placeholder="搜索任务..." aria-label="搜索任务">
    </div>

    <!-- Filters -->
    <div class="filters" role="tablist">
      <button class="filter-btn active" data-filter="all" role="tab" aria-selected="true">全部</button>
      <button class="filter-btn" data-filter="active" role="tab" aria-selected="false">未完成</button>
      <button class="filter-btn" data-filter="completed" role="tab" aria-selected="false">已完成</button>
    </div>

    <!-- Todo List -->
    <div id="todoLoading" class="loading" style="display:none">
      <div class="spinner"></div>
    </div>

    <ul id="todoList" class="todo-list" aria-label="任务列表"></ul>

    <div id="emptyState" class="empty-state" style="display:none">
      <div class="empty-state-icon">📝</div>
      <div class="empty-state-title">暂无任务</div>
      <div class="empty-state-text">在上方输入框中添加你的第一个任务吧</div>
    </div>

    <!-- Footer -->
    <div id="footer" class="footer" style="display:none">
      <span id="todoStats">共 0 项，已完成 0 项</span>
      <button id="clearCompletedBtn" class="footer-clear" type="button">清除已完成</button>
    </div>
  </div>

  <!-- Snackbar -->
  <div id="snackbar" class="snackbar">
    <span id="snackbarText"></span>
    <button id="snackbarUndo" class="snackbar-undo" type="button">撤销</button>
  </div>

  <!-- Confirm Dialog -->
  <div id="confirmOverlay" class="overlay" role="dialog" aria-modal="true">
    <div class="confirm-dialog">
      <div id="confirmTitle" class="confirm-title"></div>
      <div id="confirmText" class="confirm-text"></div>
      <div class="confirm-actions">
        <button id="confirmCancel" class="confirm-btn cancel" type="button">取消</button>
        <button id="confirmOk" class="confirm-btn danger" type="button">确认</button>
      </div>
    </div>
  </div>

  <!-- Hidden file input for import -->
  <input id="fileInput" type="file" accept=".json" style="display:none">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
